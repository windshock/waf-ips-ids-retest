services:
  syrup-web:
    image: python:3.12-alpine
    working_dir: /srv
    volumes:
      - ./syrup_app.py:/srv/syrup_app.py:ro
    environment:
      MODE: web
    command: ["python", "/srv/syrup_app.py"]

  syrup-next:
    image: python:3.12-alpine
    working_dir: /srv
    volumes:
      - ./syrup_app.py:/srv/syrup_app.py:ro
    environment:
      MODE: next
    command: ["python", "/srv/syrup_app.py"]

  syrup-appjson:
    image: python:3.12-alpine
    working_dir: /srv
    volumes:
      - ./syrup_app.py:/srv/syrup_app.py:ro
    environment:
      MODE: appjson
    command: ["python", "/srv/syrup_app.py"]

  syrup-front:
    image: nginx:1.27-alpine
    depends_on:
      - syrup-web
      - syrup-next
      - syrup-appjson
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/error403.html:/usr/share/nginx/html/error403.html:ro
      - ./nginx/style_pc.css:/usr/share/nginx/html/style_pc.css:ro
    ports:
      - "19090:8080"
      - "19270:27000"
