events {}

http {
  server {
    listen 8080 default_server;
    server_name _;

    error_page 403 /error403.html;

    location = /__lab/front403 {
      return 403;
    }

    location = /__lab/front400 {
      default_type text/html;
      return 400 "Not Found(400)";
    }

    location = /error403.html {
      root /usr/share/nginx/html;
      internal;
    }

    location = /auth/ {
      proxy_pass http://syrup-next:8080;
      proxy_set_header Host $host;
    }

    location = /gold-platform/register-password/ {
      proxy_pass http://syrup-next:8080;
      proxy_set_header Host $host;
    }

    location / {
      default_type text/plain;
      return 404;
    }
  }

  server {
    listen 8080;
    server_name www.syrup.co.kr;

    location = /notice.do {
      proxy_pass http://syrup-web:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Test $http_x_test;
    }
  }

  server {
    listen 8080;
    server_name nxt.syrup.co.kr;

    location = /auth/ {
      proxy_pass http://syrup-next:8080;
      proxy_set_header Host $host;
    }

    location = /gold-platform/register-password/ {
      proxy_pass http://syrup-next:8080;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 27000;
    server_name syrup-appif.smartwallet.co.kr;

    location = /swapp/sw5/5667 {
      proxy_pass http://syrup-appjson:8080;
      proxy_set_header Host $host;
      proxy_set_header Content-Type $content_type;
    }
  }

  server {
    listen 8080;
    server_name static.syrup.co.kr;

    location = /static/v2/publishing/syrup_intro_2025/css/style_pc.css {
      root /usr/share/nginx/html;
      add_header Cache-Control "max-age=2592000";
      add_header X-Cache-Status "HIT";
      default_type text/css;
      try_files /style_pc.css =404;
    }
  }
}
