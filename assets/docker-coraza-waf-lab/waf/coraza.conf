# Coraza WAF Configuration for TC-27 white-box lab
# This file is intentionally exposed so Claude can read detection logic
# and design bypass variants that exploit grammar un-equivalence.
#
# Reference: "$170k in Bypasses: The Vercel React2Shell Challenge"
# https://www.hacktron.ai/blog/react2shell-vercel-waf-bypass

SecRuleEngine On

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

SecResponseBodyAccess Off

SecDebugLogLevel 4

# === DETECTION RULES ===

# Rule 1008: Block Prototype Pollution patterns in multipart form fields.
# Coraza parses multipart body using Go's mime/multipart (RFC 2046).
# Populated ARGS variable is then matched against this regex.
#
# Grammar un-equivalence gaps (white-box notes for Claude):
#
# 1. Duplicate boundary param: Go uses FIRST boundary; some backends use LAST.
#    Send: boundary=real; boundary=fake
#    If Coraza uses "real" and backend uses "fake", or vice versa,
#    one side sees the attack field and the other doesn't.
#
# 2. Non-UTF8 bytes in header: Coraza may fail-open on parse errors.
#    Insert 0x88 into a Content-Type parameter — if Coraza skips the
#    request rather than blocking, it's a fail-open.
#
# 3. UTF-16LE charset in part: ARGS is populated from decoded values.
#    If Coraza does not decode utf-16le in multipart parts, the raw
#    bytes don't match the regex — but the backend (busboy/Node.js) does.
#
# 4. Duplicate Content-Type in part: Coraza picks one; backend picks the other.
#    First vs last header wins differently per implementation.
#
# 5. Trailing space in --boundary-- end marker: RFC 2046 allows only CRLF
#    after the closing boundary. Some parsers accept trailing spaces; others
#    don't recognise the closing marker and misparse the rest of the body.
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (?:__proto__|:constructor|\.constructor|prototype\[)" \
    "id:1008,phase:2,deny,status:403,msg:'Prototype Pollution Attempt',tag:'CVE-2025-55182',severity:CRITICAL"

# Rule 1009: Block TC-27 probe marker (lab validation — remove in production).
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx RETEST-TC27-PROBE" \
    "id:1009,phase:2,deny,status:403,msg:'TC27 probe marker detected',severity:INFO"
