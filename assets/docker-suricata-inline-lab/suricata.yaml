%YAML 1.1
---
vars:
  address-groups:
    HOME_NET: "[172.30.10.0/24,172.30.20.0/24]"
    EXTERNAL_NET: "!$HOME_NET"

default-rule-path: /lab

rule-files:
  - local.rules

af-packet: []

pcap: []

nfq:
  mode: accept
  repeat-mark: 1
  repeat-mask: 1
  batchcount: 20

stream:
  memcap: 64mb
  checksum-validation: no
  inline: yes
  reassembly:
    memcap: 64mb
    depth: 1mb

app-layer:
  protocols:
    http:
      enabled: yes
      libhtp:
        default-config:
          request-body-limit: 2mb
          response-body-limit: 2mb

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      community-id: true
      types:
        - alert
        - http
        - drop
        - stats:
            totals: yes

logging:
  default-log-level: notice
